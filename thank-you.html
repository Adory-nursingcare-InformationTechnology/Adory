<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="お問い合わせありがとうございます - 株式会社Adory">
  <title>お問い合わせ完了 | 株式会社Adory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--red:#D41D00;--orange:#FF9A3F;--gradient:linear-gradient(135deg,#D41D00,#FF9A3F);--gradient-soft:linear-gradient(135deg,#fff5f0,#ffe8d6);--dark:#1a1a1a;--text:#333;--text-light:#666;--text-muted:#999;--bg:#fff;--bg-warm:#FFFAF7;--bg-section:#FBF8F6;--shadow-sm:0 2px 8px rgba(0,0,0,.06);--shadow-md:0 8px 30px rgba(0,0,0,.08);--shadow-lg:0 20px 60px rgba(0,0,0,.1);--shadow-glow:0 8px 40px rgba(212,29,0,.15);--radius:20px;--radius-sm:12px;--max-w:1200px;--font-jp:'Noto Sans JP',sans-serif;--font-en:'Outfit',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-jp);color:var(--text);line-height:1.8;background:var(--bg-warm);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
    img{max-width:100%;display:block}a{text-decoration:none;color:inherit}

    header{position:fixed;top:0;width:100%;z-index:1000;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.06);transition:box-shadow .3s,background .3s}
    header.scrolled{background:rgba(255,255,255,.95);box-shadow:0 4px 30px rgba(0,0,0,.08)}
    nav{max-width:var(--max-w);margin:0 auto;padding:.9rem 5%;display:flex;align-items:center;justify-content:center}
    .logo{font-family:var(--font-en);font-weight:800;font-size:1.6rem;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;transition:transform .3s}
    .logo:hover{transform:scale(1.03)}

    main{flex:1;display:flex;align-items:center;justify-content:center;padding:6rem 5% 4rem}

    @keyframes fadeSlideIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

    .thank-card{background:#fff;border-radius:var(--radius);padding:3.5rem 3rem;text-align:center;box-shadow:var(--shadow-lg);max-width:600px;width:100%;position:relative;overflow:hidden;animation:fadeSlideIn .8s .2s both}
    .thank-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradient)}

    .success-icon{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#4ade80);margin:0 auto 2rem;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(34,197,94,.25);animation:iconPulse 2.5s ease-in-out infinite}
    .success-icon::after{content:'\2713';color:#fff;font-size:2.8rem;font-weight:900}
    @keyframes iconPulse{0%,100%{transform:scale(1);box-shadow:0 10px 30px rgba(34,197,94,.25)}50%{transform:scale(1.06);box-shadow:0 16px 40px rgba(34,197,94,.35)}}

    .thank-title{font-size:1.8rem;font-weight:900;color:var(--dark);margin-bottom:.8rem}
    .thank-sub{font-size:1rem;color:var(--text-light);margin-bottom:2.5rem;line-height:1.9}

    .info-box{background:var(--gradient-soft);border:1.5px solid rgba(255,154,63,.15);border-radius:var(--radius-sm);padding:1.8rem;margin-bottom:2.5rem;text-align:left}
    .info-box h3{font-size:1rem;font-weight:800;color:var(--red);margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
    .info-box ul{list-style:none;padding:0}
    .info-box li{margin-bottom:.5rem;padding-left:1.4rem;position:relative;font-size:.9rem;color:var(--text-light)}
    .info-box li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gradient);position:absolute;left:0;top:.65rem}

    .btn-row{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.85rem 2rem;border-radius:999px;font-weight:700;font-size:.95rem;transition:transform .35s cubic-bezier(.16,1,.3,1),box-shadow .35s;position:relative;overflow:hidden}
    .btn-primary{background:var(--gradient);color:#fff;box-shadow:var(--shadow-glow)}
    .btn-primary::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);transition:left .6s ease}
    .btn-primary:hover::after{left:120%}
    .btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(212,29,0,.3)}
    .btn-secondary{background:#fff;color:var(--text-light);border:2px solid #eee;box-shadow:var(--shadow-sm)}
    .btn-secondary:hover{transform:translateY(-3px);border-color:var(--orange);color:var(--red);box-shadow:var(--shadow-md)}

    footer{background:rgba(255,255,255,.95);color:var(--text);padding:2.5rem 5% 1.5rem;position:relative;border-top:1px solid rgba(0,0,0,.06)}
    footer::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradient)}
    .footer-inner{max-width:var(--max-w);margin:0 auto;display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;margin-bottom:1.5rem}
    .footer-inner a{font-size:.9rem;color:var(--text-light);transition:color .3s}
    .footer-inner a:hover{color:var(--red)}
    .footer-copy{text-align:center;font-size:.82rem;color:var(--text-muted)}

    body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:9998;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

    @media(max-width:768px){
      .thank-card{padding:2.5rem 1.8rem}
      .thank-title{font-size:1.4rem}
      .btn-row{flex-direction:column;align-items:center}
      .btn{width:100%;max-width:280px;justify-content:center}
    }
    @media(max-width:480px){
      .thank-card{padding:2rem 1.3rem}
      .success-icon{width:80px;height:80px}.success-icon::after{font-size:2.2rem}
    }
  </style>
</head>
<body>
  <header id="header">
    <nav>
      <a href="index.html" class="logo">Adory</a>
    </nav>
  </header>

  <main>
    <div class="thank-card">
      <div class="success-icon"></div>
      <h1 class="thank-title">お問い合わせありがとうございます</h1>
      <p class="thank-sub">お問い合わせを正常に受信いたしました。<br>担当者より改めてご連絡させていただきます。</p>
      <div class="info-box">
        <h3>&#x1F4CB; 今後の流れについて</h3>
        <ul>
          <li>内容を確認の上、営業日2〜3日以内に担当者よりご連絡いたします</li>
          <li>ご不明な点がございましたら、お気軽にお問い合わせください</li>
        </ul>
      </div>
      <div class="btn-row">
        <a href="index.html" class="btn btn-primary">ホームに戻る</a>
        <a href="service.html" class="btn btn-secondary">サービス概要を見る</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <a href="index.html">ホーム</a>
      <a href="index.html#about">会社概要</a>
      <a href="service.html">サービス概要</a>
      <a href="https://adory-media.studio.site" target="_blank" rel="noopener noreferrer">お役立ち情報</a>
    </div>
    <p class="footer-copy"><a href="privacy.html" style="color:var(--text-muted);margin-right:.8rem">プライバシーポリシー</a><a href="terms.html" style="color:var(--text-muted)">利用規約</a></p>
    <p class="footer-copy" style="margin-top:.5rem">&copy; 2025 株式会社Adory. All rights reserved.</p>
  </footer>
</body>
</html>
